services:
  scielo-proceedings:
    platform: linux/amd64
    build:
      context: .
      dockerfile: docker/rocky9/Dockerfile
    container_name: scielo-proceedings
    ports:
      - "8081:8080"
    user: "65534:65534"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=1g
      - /run:rw,nosuid,size=64m,uid=65534,gid=65534
    volumes:
      - ./:/var/www/html
    restart: unless-stopped
